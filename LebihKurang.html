<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuiz Lebih Daripada / Kurang Daripada</title>
<style>

* {
    box-sizing: border-box;
}

body{
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(145deg, #fbbf24 0%, #f59e0b 100%);
    margin:0;
    padding:20px;
    min-height:100vh;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:35px;
    padding:30px 25px;
    box-shadow:0 20px 35px rgba(0,0,0,0.25);
    transition:0.2s;
}

h1{
    text-align:center;
    color:#b45309;
    margin-bottom:8px;
    font-size:2rem;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
}

.subtitle{
    text-align:center;
    margin-bottom:30px;
    font-size:1.1rem;
    background:#fffbeb;
    display:inline-block;
    width:100%;
    padding:8px;
    border-radius:60px;
    color:#92400e;
}

.subtitle b{
    background:#fde68a;
    padding:4px 12px;
    border-radius:50px;
    margin:0 4px;
}

/* Styling for max number control */
.max-control {
    background: #fff7ed;
    border-radius: 60px;
    padding: 12px 20px;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
    border: 2px solid #fed7aa;
}

.max-control label {
    font-weight: bold;
    color: #9a3412;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    gap: 8px;
}

.max-control input {
    width: 100px;
    padding: 10px 12px;
    font-size: 1rem;
    font-weight: bold;
    text-align: center;
    border: 2px solid #f59e0b;
    border-radius: 40px;
    background: white;
    color: #78350f;
    outline: none;
    transition: 0.2s;
}

.max-control input:focus {
    border-color: #ea580c;
    box-shadow: 0 0 0 3px rgba(234,88,12,0.2);
}

.max-control button {
    background: #f59e0b;
    border: none;
    border-radius: 40px;
    padding: 10px 20px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    font-size: 0.9rem;
}

.max-control button:hover {
    background: #d97706;
    transform: scale(1.02);
}

.max-value-badge {
    background: #fde68a;
    padding: 6px 14px;
    border-radius: 40px;
    font-weight: bold;
    color: #92400e;
    font-size: 0.9rem;
}

.question-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    padding:18px 20px;
    margin-bottom:14px;
    background:#fffaf0;
    border-radius:28px;
    border:3px solid transparent;
    transition:all 0.2s;
    flex-wrap:wrap;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.question-text{
    font-size:1.4rem;
    font-weight:bold;
    flex:2;
    min-width:280px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.number-badge{
    background:#fef3c7;
    padding:8px 20px;
    border-radius:60px;
    font-weight:800;
    font-size:1.7rem;
    color:#78350f;
    min-width:90px;
    text-align:center;
    box-shadow:inset 0 -1px 0 rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.05);
}

.options{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
}

.option-btn{
    border:none;
    border-radius:40px;
    padding:12px 26px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    background:#fcd34d;
    color:#78350f;
    transition:0.2s;
    box-shadow:0 3px 6px rgba(0,0,0,0.1);
}

.option-btn:hover{
    transform:translateY(-2px);
    background:#fbbf24;
    box-shadow:0 6px 12px rgba(0,0,0,0.15);
}

.option-btn.selected{
    background:#ea580c;
    color:white;
    box-shadow:0 2px 8px rgba(234,88,12,0.4);
}

.correct{
    border-left:12px solid #22c55e;
    background:#e6f7ec;
    border-radius:28px;
    transition:0.1s;
}

.wrong{
    border-left:12px solid #ef4444;
    background:#fee9e9;
}

.correct-answer{
    font-size:0.95rem;
    font-weight:600;
    margin-top:5px;
    width:100%;
    text-align:center;
    padding:6px 10px;
    background:#ffffffb3;
    border-radius:40px;
}

.controls{
    margin-top:30px;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
}

.control-btn{
    flex:1;
    border:none;
    border-radius:60px;
    padding:16px 12px;
    font-size:1.1rem;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.check-btn{
    background:#16a34a;
    color:white;
}

.check-btn:hover{
    background:#15803d;
    transform:scale(1.02);
}

.reset-btn{
    background:#f97316;
    color:white;
}

.reset-btn:hover{
    background:#ea580c;
    transform:scale(1.02);
}

.score-box{
    margin-top:25px;
    text-align:center;
    font-size:1.6rem;
    font-weight:bold;
    background:#fefce8;
    padding:12px;
    border-radius:80px;
    color:#b45309;
    letter-spacing:1px;
}

.emoji-badge{
    font-size:1.4rem;
}

@media(max-width:650px){
    .container{
        padding:18px;
    }
    .question-row{
        flex-direction:column;
        align-items:stretch;
    }
    .options{
        justify-content:center;
        width:100%;
    }
    .option-btn{
        flex:1;
        text-align:center;
    }
    .number-badge{
        font-size:1.3rem;
        padding:5px 12px;
        min-width:70px;
    }
    .question-text{
        gap:12px;
    }
    .max-control {
        flex-direction: column;
        align-items: stretch;
    }
    .max-control input {
        width: 100%;
    }
}

</style>
</head>
<body>

<div class="container">

    <h1>
        🧸 Kuiz Matematik 
        <span style="font-size:1.8rem;">📊</span>
    </h1>

    <div class="subtitle">
        ⚡ Bandingkan nombor :  
        <b>Lebih Daripada ( > )</b>  atau  
        <b>Kurang Daripada ( < )</b> 
    </div>

    <!-- NEW: Textbox to set max number -->
    <div class="max-control">
        <label>🔢 Nombor maksimum:</label>
        <input type="number" id="maxNumberInput" value="100" min="2" max="9999" step="1">
        <button onclick="applyMaxNumberAndRegenerate()">📝 Jana Soalan</button>
    </div>

    <div id="questionsContainer"></div>

    <div class="controls">
        <button class="control-btn check-btn" onclick="checkAnswers()">
            ✅ Semak Jawapan
        </button>
        <button class="control-btn reset-btn" onclick="generateQuiz()">
            🔄 Soalan Baru
        </button>
    </div>

    <div class="score-box" id="scoreBox">
        Skor: 0 / 15
    </div>

</div>

<script>

const TOTAL_QUESTIONS = 15;

// Default max value (sama seperti kod asal, nilai 100)
let currentMaxValue = 100;   // akan guna nilai dari textbox

// Fungsi untuk menjana nombor berdasarkan currentMaxValue
function randomNumberGenerated(){
    // Menjana nombor rawak dari 1 hingga currentMaxValue (inklusif)
    // Contoh: jika currentMaxValue = 200 => 1..200
    // Jika currentMaxValue = 50 => 1..50
    // Pastikan nombor sentiasa positif & tidak melebihi max
    let max = Math.max(2, Math.floor(currentMaxValue)); // sekurang-kurangnya 2 supaya boleh banding
    return Math.floor(Math.random() * max) + 1;
}

let questions = [];

// Fungsi untuk menggunakan nilai dari textbox & update pembolehubah
function applyMaxNumberAndRegenerate() {
    const inputElement = document.getElementById("maxNumberInput");
    let newMax = parseInt(inputElement.value, 10);
    
    // Validation: mesti nombor, sekurang-kurangnya 2 (supaya boleh hasilkan dua nombor berbeza)
    if (isNaN(newMax) || newMax < 2) {
        newMax = 2;
        inputElement.value = 2;
    }
    
    // Had atas yang munasabah, tetapi boleh set hingga 9999 (tapi ikut keperluan)
    if (newMax > 9999) {
        newMax = 9999;
        inputElement.value = 9999;
    }
    
    currentMaxValue = newMax;
    
    // Jana semula kuiz dengan max value baru
    generateQuiz();
}

// Fungsi untuk refresh nilai max dari textbox (guna semasa generate jika perlu)
function syncMaxFromInput() {
    const inputElement = document.getElementById("maxNumberInput");
    if (inputElement) {
        let val = parseInt(inputElement.value, 10);
        if (!isNaN(val) && val >= 2) {
            currentMaxValue = val;
        } else {
            // reset ke nilai selamat
            currentMaxValue = 100;
            inputElement.value = 100;
        }
    }
}

function generateQuiz(){

    questions = [];

    const container =
        document.getElementById("questionsContainer");

    container.innerHTML = "";
    
    // Pastikan nilai max semasa sejajar dengan textbox sebelum menjana
    syncMaxFromInput();

    for(let i=0; i<TOTAL_QUESTIONS; i++){

        // GUNAKAN randomNumberGenerated() berdasarkan currentMaxValue
        let num1 = randomNumberGenerated();
        let num2 = randomNumberGenerated();

        // pastikan nombor tidak sama (supaya perbandingan jelas: lebih atau kurang)
        while(num1 === num2){
            num2 = randomNumberGenerated();
        }

        const correctAnswer =
            num1 > num2
            ? "lebih"
            : "kurang";

        const q = {
            num1,
            num2,
            correctAnswer,
            selected: null
        };

        questions.push(q);

        const row = document.createElement("div");
        row.className = "question-row";
        row.id = "row-" + i;

        // innerHTML reka bentuk dengan badge nombor untuk lebih menarik & jelas
        row.innerHTML = `
            <div class="question-text">
                <span class="number-badge">
                    ${num1}
                </span>

                <div class="options">
                    <button class="option-btn" onclick="selectAnswer(${i}, 'lebih', this)">
                        🟢 Lebih Daripada &nbsp;>
                    </button>
                    <button class="option-btn" onclick="selectAnswer(${i}, 'kurang', this)">
                        🔴 Kurang Daripada &nbsp;<
                    </button>
                </div>

                <span class="number-badge">
                    ${num2}
                </span>
            </div>

            <div class="correct-answer" id="answer-${i}"></div>
        `;

        container.appendChild(row);
    }

    // reset skor paparan
    document.getElementById("scoreBox").innerHTML =
        `⭐ Skor: 0 / ${TOTAL_QUESTIONS}`;
}

// Fungsi untuk memilih jawapan (lebih/kurang) bagi setiap soalan
function selectAnswer(index, answer, button){

    // rekod jawapan yang dipilih pengguna
    questions[index].selected = answer;

    // cari elemen .question-text yang merupakan parent dari butang? Sebenarnya struktur: 
    // button berada dalam .options, dan .options dalam .question-text
    // supaya dapat remove class selected dari butang lain dalam kumpulan yang sama
    const optionsDiv = button.closest('.options');
    if(optionsDiv){
        const buttons = optionsDiv.querySelectorAll(".option-btn");
        buttons.forEach(btn => {
            btn.classList.remove("selected");
        });
    }
    button.classList.add("selected");
}

function checkAnswers(){

    let score = 0;

    questions.forEach((q, index) => {

        const row =
            document.getElementById("row-" + index);

        const answerDiv =
            document.getElementById("answer-" + index);

        // hapus kelas marking sebelumnya
        row.classList.remove("correct");
        row.classList.remove("wrong");

        if(q.selected === q.correctAnswer){

            score++;
            row.classList.add("correct");

            // papar mesej betul dengan emotikon
            answerDiv.innerHTML = `✅ Betul!  (${q.num1} ${q.correctAnswer === 'lebih' ? '>' : '<'} ${q.num2})`;
        }
        else{

            row.classList.add("wrong");

            // papar jawapan yang betul
            const correctText = q.correctAnswer === "lebih" 
                ? "Lebih Daripada (>)"
                : "Kurang Daripada (<)";
            
            answerDiv.innerHTML = `❌ Jawapan betul: <b>${correctText}</b>  (${q.num1} ${q.correctAnswer === 'lebih' ? '>' : '<'} ${q.num2})`;
        }

    });

    // papar skor semasa
    document.getElementById("scoreBox").innerHTML =
        `🎉 Skor: ${score} / ${TOTAL_QUESTIONS} 🎉`;
}

// Init: set currentMaxValue dari input (100) dan jana kuiz
function init() {
    const inputElem = document.getElementById("maxNumberInput");
    if(inputElem) {
        currentMaxValue = parseInt(inputElem.value, 10);
        if(isNaN(currentMaxValue) || currentMaxValue < 2) currentMaxValue = 100;
        document.getElementById("currentMaxDisplay").innerText = `Maks: ${currentMaxValue}`;
    }
    generateQuiz();
}

init();

</script>

</body>
</html>
