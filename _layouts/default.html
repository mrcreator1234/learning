<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Pembelajaran Anak-anak</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffe08a;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-link {
            display: inline-block;
            background: #f59e0b;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 25px;
            margin: 10px 5px;
            border-radius: 40px;
            transition: 0.2s;
        }
        .btn-link:hover {
            background: #b45309;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="container">
        {{ content }}
    </div>
</body>
</html>
